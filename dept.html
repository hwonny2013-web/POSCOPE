<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>부서 현황 — POSCOPE</title>
  <script src="/static_libs/chart.umd.min.js"></script>
  <style>
    :root{--blue-dark:#002060;--blue-mid:#004EA2;--blue-light:#E9F1FA;--accent:#009FE8;--green:#007A53;--red:#C0392B;--gray-bg:#F5F7FA;--gray-bd:#D9E2EE;--text:#1A1F36;--sub:#5F6B8A;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--gray-bg);color:var(--text);}
    a{color:inherit;text-decoration:none;}

    header{background:linear-gradient(90deg,#001848 0%,#002E7A 50%,#004EA2 100%);color:#fff;padding:14px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.25);}
    .back-btn{padding:6px 14px;border:1.5px solid rgba(255,255,255,.5);border-radius:20px;font-size:12px;color:#fff;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .back-btn:hover{background:rgba(255,255,255,.15);}
    .h-icon{font-size:28px;}
    .h-title{font-size:20px;font-weight:800;letter-spacing:1px;}
    .h-sub{font-size:11px;opacity:.75;margin-top:2px;}
    .h-badge{margin-left:auto;font-size:11px;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.2);font-weight:600;}

    /* STATS BAR */
    .stats-bar{background:#fff;border-bottom:1px solid var(--gray-bd);padding:14px 32px;display:flex;gap:28px;align-items:center;overflow-x:auto;}
    .stat{text-align:center;white-space:nowrap;}
    .stat .val{font-size:24px;font-weight:800;color:var(--blue-dark);}
    .stat .lbl{font-size:11px;color:var(--sub);margin-top:2px;}
    .divider{width:1px;height:36px;background:var(--gray-bd);flex-shrink:0;}

    /* PIPELINE */
    .pipeline{background:#fff;border-bottom:1px solid var(--gray-bd);padding:14px 32px;display:flex;align-items:center;gap:0;}
    .pipe-step{flex:1;text-align:center;padding:10px 8px;border-radius:10px;transition:background .15s;cursor:pointer;}
    .pipe-step:hover{background:var(--blue-light);}
    .pipe-step.active{background:var(--blue-mid)!important;}
    .pipe-step.active .ps-label{color:#fff;}
    .pipe-step.active .ps-count{color:#fff;opacity:.9;}
    .ps-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;}
    .ps-count{font-size:22px;font-weight:800;color:var(--blue-dark);}
    .pipe-arrow{font-size:16px;color:var(--gray-bd);flex-shrink:0;padding:0 4px;}
    .pipe-sep{width:1px;height:40px;background:var(--gray-bd);margin:0 8px;flex-shrink:0;}

    /* MAIN LAYOUT */
    .main{padding:24px 32px;display:grid;grid-template-columns:1fr 340px;gap:22px;max-width:1400px;}
    @media(max-width:900px){.main{grid-template-columns:1fr;}}

    /* TABLE */
    .tcard{background:#fff;border-radius:14px;border:1.5px solid var(--gray-bd);overflow:hidden;}
    .tcard-header{padding:16px 20px;border-bottom:1px solid var(--gray-bd);display:flex;align-items:center;gap:12px;}
    .tcard-header h3{font-size:14px;font-weight:700;flex:1;}
    .filter-row{display:flex;gap:7px;flex-wrap:wrap;}
    .fchip{padding:4px 10px;border-radius:20px;font-size:11px;border:1.5px solid var(--gray-bd);cursor:pointer;transition:all .15s;background:#fff;}
    .fchip:hover{border-color:var(--blue-mid);color:var(--blue-mid);}
    .fchip.active{background:var(--blue-mid);color:#fff;border-color:var(--blue-mid);}
    .search-wrap{position:relative;margin-left:auto;}
    .search-input{padding:5px 10px 5px 26px;border:1.5px solid var(--gray-bd);border-radius:16px;font-size:11px;outline:none;width:180px;transition:border-color .2s;}
    .search-input:focus{border-color:var(--blue-mid);}
    .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--sub);pointer-events:none;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    thead{background:var(--gray-bg);}
    th{padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--sub);border-bottom:1px solid var(--gray-bd);white-space:nowrap;cursor:pointer;user-select:none;}
    th:hover{color:var(--blue-mid);}
    td{padding:10px 14px;border-bottom:1px solid var(--gray-bd);vertical-align:top;max-width:200px;word-break:break-word;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#f8faff;}
    .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
    .st-검토중{background:#dbeafe;color:#1e40af;}.st-오퍼제출{background:#fef9c3;color:#854d0e;}.st-협상중{background:#ffedd5;color:#c2410c;}.st-수주{background:#d1fae5;color:#065f46;}.st-유찰{background:#f3f4f6;color:#6b7280;}
    .td-title{font-weight:600;max-width:220px;}
    .td-tons{white-space:nowrap;font-variant-numeric:tabular-nums;}
    .td-dl{white-space:nowrap;font-size:11px;}
    .td-dl.urg{color:var(--red);font-weight:700;}
    .empty-row td{text-align:center;color:var(--sub);padding:30px;}

    /* SIDEBAR CARDS */
    .aside{display:flex;flex-direction:column;gap:18px;}
    .aside-card{background:#fff;border-radius:14px;border:1.5px solid var(--gray-bd);padding:20px;}
    .aside-card h3{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
    .chart-wrap{position:relative;height:180px;}
    .dl-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray-bd);font-size:11px;}
    .dl-item:last-child{border-bottom:none;}
    .dl-days{min-width:44px;text-align:center;font-size:11px;font-weight:800;padding:3px 6px;border-radius:7px;}
    .dl-days.urgent{background:#fee2e2;color:var(--red);}
    .dl-days.warn{background:#fef3c7;color:#92400e;}
    .dl-days.ok{background:#d1fae5;color:#065f46;}
    .dl-title{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:9px;font-size:12px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;}
    .toast.show{opacity:1;}
  </style>
</head>

<script>
const DIV_META={
  steel:{icon:'🔩',title:'철강본부',sub:'H형강 · 후판 · 강관 등 건설/인프라용 강재'},
  materials:{icon:'🌾',title:'소재바이오본부',sub:'곡물 · 비료 · 팜오일 · 이차전지 소재 트레이딩'},
  energy:{icon:'⚡',title:'에너지사업본부',sub:'LNG 트레이딩 · 터미널 · 발전 · 신재생'},
  gas:{icon:'🛢️',title:'가스사업본부',sub:'가스전 E&P · 가스개발 · 가스전운영'},
};
const div=location.pathname.replace('/dept/','');
const meta=DIV_META[div]||{icon:'📋',title:'부서 현황',sub:''};
document.getElementById('hIcon').textContent=meta.icon;
document.getElementById('hTitle').textContent=meta.title;
document.getElementById('hSub').textContent=meta.sub;
document.title=meta.title+' — POSCOPE';

let DATA=[],pipeFilter='all',countryFilter='all',sortCol='deadline',sortAsc=true;

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

async function load(){
  const res=await fetch(`/api/projects?div=${div}`);
  DATA=await res.json();
  updateStats();
  updatePipeline();
  renderTable();
  renderCharts();
  renderDeadline();
}

function updateStats(){
  const today=new Date().toISOString().split('T')[0];
  const in30=new Date(Date.now()+30*86400000).toISOString().split('T')[0];
  document.getElementById('s-total').textContent=DATA.length;
  document.getElementById('s-won').textContent=DATA.filter(p=>(p.status||'검토중')==='수주').length;
  document.getElementById('s-progress').textContent=DATA.filter(p=>['검토중','오퍼제출','협상중'].includes(p.status||'검토중')).length;
  document.getElementById('s-lost').textContent=DATA.filter(p=>(p.status||'검토중')==='유찰').length;
  document.getElementById('s-sf').textContent=DATA.filter(p=>p.sfHistory.length>0).length;
  document.getElementById('s-urgent').textContent=DATA.filter(p=>p.deadline&&p.deadline>=today&&p.deadline<=in30).length;
  document.getElementById('hBadge').textContent=`전체 ${DATA.length}건`;
}

function updatePipeline(){
  const all=['all','검토중','오퍼제출','협상중','수주','유찰'];
  document.getElementById('pc-all').textContent=DATA.length;
  ['검토중','오퍼제출','협상중','수주','유찰'].forEach(s=>{
    const el=document.getElementById('pc-'+s);
    if(el)el.textContent=DATA.filter(p=>(p.status||'검토중')===s).length;
  });
  all.forEach(s=>{
    const el=document.getElementById('pf-'+s);
    if(el)el.classList.toggle('active',pipeFilter===s);
  });
}

function setPipeFilter(v){pipeFilter=v;updatePipeline();renderTable();}
function setCountryFilter(el,v){
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');countryFilter=v;renderTable();
}
function toggleSort(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}renderTable();}

function renderTable(){
  const q=(document.getElementById('tableSearch').value||'').toLowerCase();
  let rows=DATA.filter(p=>{
    if(pipeFilter!=='all'&&(p.status||'검토중')!==pipeFilter)return false;
    if(countryFilter!=='all'&&p.country!==countryFilter)return false;
    if(q){
      const t=((p.title||'')+' '+(p.owner||'')+' '+(p.steel||'')+' '+(p.region||'')).toLowerCase();
      if(!t.includes(q))return false;
    }
    return true;
  });
  rows.sort((a,b)=>{
    let va=a[sortCol]||'',vb=b[sortCol]||'';
    if(sortCol==='deadline'){va=va||'9999-12-31';vb=vb||'9999-12-31';}
    const cmp=String(va).localeCompare(String(vb),'ko');
    return sortAsc?cmp:-cmp;
  });
  const today=new Date().toISOString().split('T')[0];
  const in30=new Date(Date.now()+30*86400000).toISOString().split('T')[0];
  const tbody=document.getElementById('proj-tbody');
  if(!rows.length){tbody.innerHTML='<tr class="empty-row"><td colspan="8">해당하는 프로젝트가 없습니다.</td></tr>';return;}
  tbody.innerHTML=rows.map(p=>{
    const st=p.status||'검토중';
    const kind=p.kind||'PJT';
    const isUrg=p.deadline&&p.deadline>=today&&p.deadline<=in30;
    return `<tr>
      <td class="td-title">${p.title}${p.subBusiness?`<div style="font-size:10px;color:var(--sub);font-weight:400">${p.subBusiness}</div>`:''}</td>
      <td><span class="tag" style="background:${kind==='INQ'?'#fce7f3':'#e0e7ff'};color:${kind==='INQ'?'#9d174d':'#3730a3'}">${kind==='INQ'?'📨 INQ':'📋 PJT'}</span></td>
      <td>${p.owner||'-'}</td>
      <td>${p.manager||'미지정'}</td>
      <td><span class="tag st-${st}">${st}</span></td>
      <td>${p.steel||'-'}</td>
      <td class="td-tons">${p.tons||'-'}</td>
      <td class="td-dl${isUrg?' urg':''}">${p.deadline||'-'}${isUrg?' ⚠️':''}</td>
    </tr>`;
  }).join('');
}

let chartInstances={};
const COLORS=['#3b82f6','#f59e0b','#f97316','#10b981','#9ca3af'];
function renderCharts(){
  Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});chartInstances={};

  const stMap={'검토중':0,'오퍼제출':0,'협상중':0,'수주':0,'유찰':0};
  DATA.forEach(p=>{const s=p.status||'검토중';if(s in stMap)stMap[s]++;});
  chartInstances.status=new Chart(document.getElementById('chartStatus'),{
    type:'doughnut',
    data:{labels:Object.keys(stMap),datasets:[{data:Object.values(stMap),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}
  });

  const regionMap={};DATA.forEach(p=>{const r=p.country||'기타';regionMap[r]=(regionMap[r]||0)+1;});
  chartInstances.region=new Chart(document.getElementById('chartRegion'),{
    type:'bar',
    data:{labels:Object.keys(regionMap),datasets:[{data:Object.values(regionMap),backgroundColor:'#3b82f6',borderRadius:5}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}

function renderDeadline(){
  const today=new Date(),todayStr=today.toISOString().split('T')[0];
  const in60=new Date(Date.now()+60*86400000).toISOString().split('T')[0];
  const upcoming=DATA.filter(p=>p.deadline&&p.deadline>=todayStr&&p.deadline<=in60).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const el=document.getElementById('deadlineList');
  if(!upcoming.length){el.innerHTML='<div style="font-size:12px;color:var(--sub);text-align:center;padding:10px;">마감 임박 없음</div>';return;}
  el.innerHTML=upcoming.map(p=>{
    const days=Math.round((new Date(p.deadline)-today)/86400000);
    const cls=days<=7?'urgent':days<=30?'warn':'ok';
    return `<div class="dl-item"><div class="dl-days ${cls}">D-${days}</div><div class="dl-title" title="${p.title}">${p.title}</div></div>`;
  }).join('');
}

load();
</script>
